<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le monde sur pause - Merchandise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <header>
         <div class="header-content">
             <h1>Le monde sur pause</h1>
             <nav class="header-nav">
                 <ul>
                     <li><a href="#cd">CD</a></li>
                     <li><a href="#livret">Carnet</a></li>
                     <li><a href="#aquarelles">Aquarelles</a></li>
                     <li><a href="#bougies">Bougies</a></li>
                 </ul>
             </nav>
         </div>
     </header>
     <div class="cart-container">
         <div class="cart-icon">
             <img src="PHOTOS MERCH EP/cart_btn.png" alt="">
             <span class="cart-count">0</span>
         </div>
         <div class="cart-dropdown">
                                         <div class="header">
                                             <h3>Panier</h3>
                                             <button class="close">+</button>
                                         </div>
                     <ul class="cart-items"></ul>
                     <div class="cart-total">Total: <span class="total-amount">0€</span></div>
                     <button class="checkout-btn">Passer commande</button>
                 </div>
     </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner">
			<p>Le monde sur pause - Merchandise</p>
			<div class="spinner"></div>
			<p>Chargement...</p>
    </div>

    <main id="main-content" style="display: none;">
        <!-- Product sections will be generated dynamically by JavaScript -->
    </main>

    <footer>
        <p>&copy; 2025 Le monde sur pause. Tous droits réservés.</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
